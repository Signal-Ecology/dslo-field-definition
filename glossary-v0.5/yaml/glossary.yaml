- term: Glossary Boundary Statement
  definition: >
    The terms listed above constitute the public-layer semantic surface of the
    DSLO substrate. The full glossary extends beyond this boundary into
    substrate-native geometry, manifold-level operators, legality masks, and
    runtime primitives that are not exposed in the public posture. This page
    provides the stabilized, invariant-preserving vocabulary required for lawful
    interpretation of DSLO at the public layer; deeper substrate terms remain
    within the protected manifold and are accessible only through the scientific
    substrate.
